seed: 42

preprocessing:
  gcn_eps: 1.0e-5
  lcn_window_size: null  # TBD — ablation in Phase 3
  lcn_eps: 1.0e-5
  output_size: 224

training:
  batch_size: 32
  num_workers: 8
  learning_rate: 1.0e-4
  epochs: 50
  optimizer: adamw
  weight_decay: 1.0e-4

wandb:
  project: sfx-hitfinder
  entity: null  # set per user

benchmark:
  split_seed: 42
  split_ratios: [0.80, 0.10, 0.10]
  variants: [strict_lodo, semi_supervised_lodo]
  detector_agnostic_max_relative_degradation: null  # set after Phase 4
  detector_agnostic_min_absolute_ap: null           # set after Phase 4
